services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    SecIT\EntityTranslationBundle\Translations\TranslationLocaleProvider:
        class: SecIT\EntityTranslationBundle\Translations\TranslationLocaleProvider

    SecIT\EntityTranslationBundle\EventListener\TranslatableListener:
        tags:
            - { name: doctrine.entity_listener, event: 'loadClassMetadata', connection: default }
            - { name: doctrine.orm.entity_listener, event: 'postLoad', connection: default }
            - { name: doctrine.orm.entity_listener, event: 'prePersist', connection: default }

    SecIT\EntityTranslationBundle\Form\Type\ResourceTranslationsType:
        public: true
